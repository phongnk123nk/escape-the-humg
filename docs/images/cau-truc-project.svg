<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="18" fill="#0f172a"/>
  <text x="54" y="64" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Cấu trúc project Unity</text>
  <text x="54" y="100" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">Các thư mục quan trọng cần biết khi mở source game</text>

  <rect x="54" y="134" width="852" height="330" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>

  <rect x="86" y="170" width="224" height="64" rx="10" fill="#1d4ed8"/>
  <text x="112" y="208" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Assets</text>
  <text x="332" y="198" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20">Mã nguồn, scene, hình ảnh, prefab, video</text>
  <text x="332" y="226" fill="#94a3b8" font-family="Arial, sans-serif" font-size="17">Scenes, image, ChessKnightImported, DeliveryCarImported, ESC...</text>

  <rect x="86" y="254" width="224" height="64" rx="10" fill="#15803d"/>
  <text x="112" y="292" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Packages</text>
  <text x="332" y="282" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20">Danh sách package Unity cần tải</text>
  <text x="332" y="310" fill="#94a3b8" font-family="Arial, sans-serif" font-size="17">manifest.json và packages-lock.json</text>

  <rect x="86" y="338" width="224" height="64" rx="10" fill="#b45309"/>
  <text x="112" y="376" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">ProjectSettings</text>
  <text x="332" y="366" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="20">Cấu hình project, build settings, input, render</text>
  <text x="332" y="394" fill="#94a3b8" font-family="Arial, sans-serif" font-size="17">ProjectVersion.txt chứa Unity 6000.3.9f1</text>

  <text x="54" y="496" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">Không xóa file .meta vì Unity dùng chúng để giữ liên kết asset.</text>
</svg>
